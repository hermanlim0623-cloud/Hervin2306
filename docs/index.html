<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAWBY  -  Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e1d9;
      --border2: #d0ccc2;
      --text: #18170f;
      --muted: #8c8979;
      --faint: #b8b4a8;
      --g: #1a6b3e;
      --g-bg: #eef7f2;
      --g-border: #b8dfc9;
      --r: #b02020;
      --r-bg: #fdf0ef;
      --r-border: #f0c4c4;
      --a: #8a5c00;
      --a-bg: #fdf6e3;
      --a-border: #e8d49a;
      --b: #1a4a80;
      --b-bg: #eef3fb;
      --b-border: #b8cee8;
      --mono: 'Geist Mono', monospace;
      --sans: 'Syne', sans-serif;
      --r8: 8px;
      --r12: 12px;
    }

    html {
      font-size: 14px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hdr-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hdr-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      background: var(--text);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .hdr-r {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--faint);
      transition: background 0.4s;
    }

    .live-dot.active {
      background: var(--g);
      animation: blink 2s ease-in-out infinite;
    }

    .live-dot.loading {
      background: var(--a);
    }

    .live-dot.error {
      background: var(--r);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.35
      }
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .scan-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .scan-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      white-space: nowrap;
    }

    .sym-input {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 9px 14px;
      color: var(--text);
      width: 140px;
      text-transform: uppercase;
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color 0.15s;
    }

    .sym-input:focus {
      border-color: var(--text);
    }

    .sym-input::placeholder {
      text-transform: none;
      font-weight: 300;
      letter-spacing: 0;
      color: var(--faint);
    }

    .btn {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 9px 16px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      background: var(--surface);
      color: var(--text);
    }

    .btn:hover {
      background: var(--bg);
      border-color: var(--border2);
    }

    .btn.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn.primary:hover {
      opacity: 0.8;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scan-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .market-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mode-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: var(--r8);
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .mode-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .mode-btn.running {
      border-color: var(--a-border);
      background: var(--a-bg);
      color: var(--a);
    }

    .mode-btn.done {
      border-color: var(--g-border);
      background: var(--g-bg);
      color: var(--g);
    }

    .mode-icon {
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 14px 16px;
    }

    .stat-l {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-v {
      font-family: var(--mono);
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1;
      color: var(--text);
    }

    .stat-v.blue {
      color: var(--b);
    }

    .stat-v.green {
      color: var(--g);
    }

    .stat-v.red {
      color: var(--r);
    }

    .stat-v.amber {
      color: var(--a);
    }

    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
      animation: slideIn 0.2s ease;
    }

    .result-panel.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rp-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .rp-sym {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
    }

    .rp-price {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.15s;
    }

    .btn-close:hover {
      color: var(--text);
    }

    .rp-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 12px 14px;
    }

    .metric-l {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .metric-v {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .metric-v.green {
      color: var(--g);
    }

    .metric-v.red {
      color: var(--r);
    }

    .metric-v.amber {
      color: var(--a);
    }

    .metric-v.blue {
      color: var(--b);
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: var(--r8);
      background: var(--bg);
    }

    .check-row.pass {
      background: var(--g-bg);
    }

    .check-row.fail {
      background: var(--r-bg);
    }

    .check-row.warn {
      background: var(--a-bg);
    }

    .check-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .check-text {
      line-height: 1.4;
    }

    .score-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .score-label {
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .score-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .score-fill.high {
      background: var(--g);
    }

    .score-fill.mid {
      background: var(--a);
    }

    .score-fill.low {
      background: var(--r);
    }

    .score-val {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .verdict {
      padding: 12px 16px;
      border-radius: var(--r8);
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .verdict.strong {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-border);
    }

    .verdict.medium {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-border);
    }

    .verdict.weak {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-border);
    }

    .verdict.neutral {
      background: var(--b-bg);
      color: var(--b);
      border: 1px solid var(--b-border);
    }

    .chart-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 8px 16px;
      background: var(--bg);
      transition: all 0.15s;
      width: fit-content;
    }

    .chart-link:hover {
      border-color: var(--border2);
      background: var(--border);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.25s ease both;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-type {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .pill-accum {
      background: var(--b-bg);
      color: var(--b);
      border: 1px solid var(--b-border);
    }

    .pill-pump {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-border);
    }

    .pill-short {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-border);
    }

    .pill-reversal {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-border);
    }

    .card-mini-bar {
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .card-mini-fill {
      height: 100%;
      border-radius: 2px;
    }

    .card-mini-fill.high {
      background: var(--g);
    }

    .card-mini-fill.mid {
      background: var(--a);
    }

    .card-mini-fill.low {
      background: var(--r);
    }

    .card-body {
      min-width: 0;
    }

    .card-sym {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 5px;
      letter-spacing: -0.01em;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      white-space: nowrap;
    }

    .tag.g {
      border-color: var(--g-border);
      color: var(--g);
      background: var(--g-bg);
    }

    .tag.r {
      border-color: var(--r-border);
      color: var(--r);
      background: var(--r-bg);
    }

    .tag.a {
      border-color: var(--a-border);
      color: var(--a);
      background: var(--a-bg);
    }

    .tag.b {
      border-color: var(--b-border);
      color: var(--b);
      background: var(--b-bg);
    }

    .card-right {
      text-align: right;
    }

    .card-time {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--faint);
      margin-bottom: 8px;
    }

    .btn-sm {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-sm:hover {
      background: var(--border);
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--faint);
    }

    .empty-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .empty-msg {
      font-size: 0.85rem;
    }

    .empty-sub {
      font-size: 0.75rem;
      margin-top: 4px;
      color: var(--faint);
    }

    .skel {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      to {
        background-position: -300% 0;
      }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 8px;
    }

    .scan-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: none;
    }

    .scan-log.show {
      display: block;
    }

    .log-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .log-lines {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 120px;
      overflow-y: auto;
    }

    .log-line {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .log-line.ok {
      color: var(--g);
    }

    .log-line.bad {
      color: var(--r);
    }

    .log-line.info {
      color: var(--b);
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .stat:nth-child(4),
      .stat:nth-child(5) {
        display: none;
      }

      .card {
        grid-template-columns: 72px 1fr;
      }

      .card-right {
        display: none;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .scan-bar {
        gap: 8px;
      }

      .sym-input {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <header class="hdr">
    <div class="hdr-l">
      <div class="live-dot" id="liveDot"></div>
      <span class="hdr-title">PAWBY <span style="color:var(--a)">V</span>2</span>
      <span class="hdr-badge">.0</span>
    </div>
    <div class="hdr-r">
      <span class="clock" id="clock">--:-- UTC</span>
    </div>
  </header>
  <div class="wrap">
    <div class="scan-bar">
      <span class="scan-label">Quick Scan</span>
      <input class="sym-input" id="symInput" placeholder="e.g. SOL" onkeydown="if(event.key==='Enter') runQuickScan()">
      <button class="btn primary" onclick="runQuickScan()">Scan</button>
      <div class="scan-divider"></div>
      <button class="btn" onclick="runShortCheck()">Short Check</button>
      <button class="btn" onclick="runAccumCheck()">Accum Check</button>
      <div class="scan-divider"></div>
      <button class="btn" onclick="exportResults('all')">📥 Export CSV</button>
    </div>
    <div class="result-panel" id="resultPanel">
      <div class="rp-head">
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="rp-sym" id="rpSym">—</span>
          <span class="rp-price" id="rpPrice"></span>
        </div>
        <button class="btn-close" onclick="closeResult()">✕</button>
      </div>
      <div class="rp-body" id="rpBody"></div>
    </div>
    <div class="market-row">
      <button class="mode-btn" id="btnAccumScan" onclick="runMarketScan('accum')"><span class="mode-icon">◉</span> Smart
        Accumulation Scan</button>
      <button class="mode-btn" id="btnPumpScan" onclick="runMarketScan('pump')"><span class="mode-icon">▲</span> Pump
        Scan (5D)</button>
      <button class="mode-btn" id="btnShortScan" onclick="runMarketScan('short')"><span class="mode-icon">▼</span> Short
        Scan</button>
      <button class="mode-btn" id="btnTopScan" onclick="runMarketScan('top')"><span class="mode-icon">⚡</span> Top
        Movers</button>
    </div>
    <div class="scan-log" id="scanLog">
      <div class="log-title">Scan Progress</div>
      <div class="log-lines" id="logLines"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-l">Found</div>
        <div class="stat-v" id="stTotal">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Accumulation</div>
        <div class="stat-v blue" id="stAccum">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Pump</div>
        <div class="stat-v green" id="stPump">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Short</div>
        <div class="stat-v red" id="stShort">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Scanned</div>
        <div class="stat-v" id="stScanned">—</div>
      </div>
    </div>
    <div class="section-head">
      <span class="section-title" id="sectionTitle">Run a scan to find signals</span>
    </div>
    <div class="cards" id="cardsGrid">
      <div class="empty">
        <div class="empty-icon">◎</div>
        <div class="empty-msg">No signals yet</div>
        <div class="empty-sub">Click a scan mode above to start</div>
      </div>
    </div>
  </div>
  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONFIG & CONSTANTS
    // ═══════════════════════════════════════════════════════════════
    const FAPI = 'https://fapi.binance.com/fapi/v1';
    const CG = 'https://api.coingecko.com/api/v3';

        <div class="metric"><div class="metric-l">Price 7D</div><div class="metric-v ${d.priceChg7d >= 0 ? 'green' : 'red'}">${d.priceChg7d >= 0 ? '+' : ''}${d.priceChg7d.toFixed(1)}%</div></div>
        <div class="metric"><div class="metric-l">Funding</div><div class="metric-v ${d.funding !== null && d.funding < THRESHOLDS.FUNDING_NEG ? 'blue' : d.funding !== null && d.funding > THRESHOLDS.FUNDING_POS ? 'red' : ''}">${d.funding !== null ? (d.funding >= 0 ? '+' : '') + d.funding.toFixed(4) + '%' : 'N/A'}</div></div>
        <div class="metric"><div class="metric-l">OI 24H</div><div class="metric-v ${d.oiData?.change24h > 10 ? 'green' : d.oiData?.change24h < -5 ? 'red' : ''}">${d.oiData ? (d.oiData.change24h >= 0 ? '+' : '') + d.oiData.change24h.toFixed(1) + '%' : 'N/A'}</div></div>
      </div>`;

      const checkHtml = `<div class="checklist">${scoreData.signals.map(s => `<div class="check-row ${s.strength === 'strong' ? 'pass' : s.strength === 'medium' ? 'warn' : 'fail'}"><span class="check-icon">${s.strength === 'strong' ? '✓' : s.strength === 'medium' ? '⚠' : '✗'}</span><span class="check-text">${s.text}</span></div>`).join('')}</div>`;

      const scorePct = Math.round((scoreData.score / scoreData.maxScore) * 100);
      const scoreHtml = `<div class="score-section"><span class="score-label">Smart Score</span><div class="score-track"><div class="score-fill ${scorePct >= 70 ? 'high' : scorePct >= 40 ? 'mid' : 'low'}" style="width:${scorePct}%"></div></div><span class="score-val">${scoreData.score}/${scoreData.maxScore} (${scorePct}%)</span></div>`;

      const verdict = scoreData.score >= 9 ? { cls: 'strong', text: '🟢 AKUMULASI SANGAT KUAT — Potensi pump besar' } : scoreData.score >= 6 ? { cls: 'medium', text: '🟡 AKUMULASI MODERAT — Pantau ketat' } : { cls: 'weak', text: '🔴 Signal lemah — Skip atau wait' };
      const verdictHtml = `<div class="verdict ${verdict.cls}">${verdict.text}</div>`;

      document.getElementById('rpBody').innerHTML = metricsHtml + checkHtml + scoreHtml + verdictHtml + `<a class="chart-link" href="${chart}" target="_blank">↗ Chart TradingView</a>`;
      panel.classList.add('show');
    }

    function closeResult() { document.getElementById('resultPanel').classList.remove('show'); }

    // ═══════════════════════════════════════════════════════════════
    // QUICK SCAN FUNCTIONS (FIXED onclick + sanitization)
    // ═══════════════════════════════════════════════════════════════
    async function runQuickScan() {
      const sym = document.getElementById('symInput').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 20);
      if (!sym) { alert('Enter valid symbol (e.g., SOL)'); return; }
      setDot('loading'); closeResult();
      try {
        const d = await analyzeCoin(sym);
        const accumResult = detectSmartAccumulation(d, d.klines4h, d.klines1d, d.oiData);
        renderResult(sym, d, accumResult, 'accum');
        setDot('active');
      } catch (e) { alert(`Error: ${e.message}`); setDot('error'); }
    }

    async function runShortCheck() {
      const sym = document.getElementById('symInput').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 20);
      if (!sym) return; setDot('loading'); closeResult();
      try {
        const d = await analyzeCoin(sym);
        const shortResult = detectPumpExhaustion(d, d.klines4h, d.klines1d);
        renderResult(sym, d, shortResult, 'short');
        setDot('active');
      } catch (e) { alert(`Error: ${e.message}`); setDot('error'); }
    }

    async function runAccumCheck() {
      const sym = document.getElementById('symInput').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 20);
      if (!sym) return; setDot('loading'); closeResult();
      try {
        const d = await analyzeCoin(sym);
        const accumResult = detectSmartAccumulation(d, d.klines4h, d.klines1d, d.oiData);
        renderResult(sym, d, accumResult, 'accum');
        setDot('active');
      } catch (e) { alert(`Error: ${e.message}`); setDot('error'); }
    }

    // ═══════════════════════════════════════════════════════════════
    // PRE-FILTER PIPELINE (Smart Filtering)
    // ═══════════════════════════════════════════════════════════════
    async function preFilterCoins(mode) {
      logMsg('🔍 Stage 1: Fetching all futures tickers...');
      const tickers = await binance('ticker/24hr', {}, 1);
      const candidates = tickers.filter(t => {
        if (!t.symbol.endsWith('USDT')) return false;
        if (['BUSD', 'USDC', 'DAI', 'TUSD', 'FDUSD'].some(s => t.symbol.includes(s))) return false;
        const vol = parseFloat(t.quoteVolume), change = parseFloat(t.priceChangePercent), price = parseFloat(t.lastPrice);
        if (vol < THRESHOLDS.MIN_VOLUME) return false;
        if (price < THRESHOLDS.MIN_PRICE || price > THRESHOLDS.MAX_PRICE) return false;
        if (mode === 'accum') return change >= THRESHOLDS.PRICE_FLAT_MIN && change <= THRESHOLDS.PRICE_FLAT_MAX;
        if (mode === 'pump') return change >= THRESHOLDS.PUMP_GAIN_MIN && change <= THRESHOLDS.PUMP_GAIN_MAX;
        if (mode === 'short') return change >= -20 && change <= 80;
        return true;
      });
      logMsg(`✓ Stage 2: ${candidates.length} candidates after basic filter`);
      const sorted = candidates.sort((a, b) => {
        if (mode === 'accum') { const volA = parseFloat(a.quoteVolume), volB = parseFloat(b.quoteVolume); return volB - volA; }
        if (mode === 'pump') return parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent);
        if (mode === 'short') { const dropA = (parseFloat(a.highPrice) - parseFloat(a.lastPrice)) / (parseFloat(a.highPrice) || 1), dropB = (parseFloat(b.highPrice) - parseFloat(b.lastPrice)) / (parseFloat(b.highPrice) || 1); return dropB - dropA; }
        return 0;
      }).slice(0, 50);
      logMsg(`🎯 Stage 3: ${sorted.length} coins selected for deep analysis`);
      return sorted.map(t => t.symbol.replace('USDT', ''));
    }
    // ═══════════════════════════════════════════════════════════════
    // MARKET SCAN ORCHESTRATOR
    // ═══════════════════════════════════════════════════════════════
    let scanning = false;
    const results = { accum: [], pump: [], short: [], top: [] };

    async function runMarketScan(mode) {
      if (scanning) return; scanning = true;
      const btnId = { accum: 'btnAccumScan', pump: 'btnPumpScan', short: 'btnShortScan', top: 'btnTopScan' }[mode];
      const btn = document.getElementById(btnId); btn.classList.add('running');
      showLog(); clearLog(); setDot('loading'); showSkeletons(); results[mode] = []; updateStats();
      document.getElementById('sectionTitle').textContent = { accum: 'Smart Accumulation Scan', pump: 'Pump Scan (5D)', short: 'Short Scan', top: 'Top Movers' }[mode];

      try {
        if (mode === 'top') await scanTopMovers();
        else if (mode === 'accum') await scanAccumulation();
        else if (mode === 'pump' || mode === 'short') await scanPumpShort(mode);
      } catch (e) { logMsg(`Error: ${e.message}`, 'bad'); setDot('error'); }

      scanning = false; btn.classList.remove('running'); btn.classList.add('done');
      setTimeout(() => btn.classList.remove('done'), 3000); setDot('active');
      renderCards(); updateStats(); logMsg('✅ Scan complete.', 'ok');
    }

    // ── TOP MOVERS ──────────────────────────────
    async function scanTopMovers() {
      logMsg('Fetching Binance Futures 24h tickers...');
      const tickers = await binance('ticker/24hr', {}, 1);
      const usdt = tickers.filter(t => t.symbol.endsWith('USDT') && !['BUSD', 'USDC', 'DAI', 'TUSD'].some(s => t.symbol.includes(s)))
        .sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent)).slice(0, 20);
      logMsg(`Top 20 fetched. Analyzing...`, 'info');
      for (const t of usdt.slice(0, 15)) {
        const sym = t.symbol.replace('USDT', ''), gain = parseFloat(t.priceChangePercent), price = parseFloat(t.lastPrice), vol = parseFloat(t.quoteVolume);
        if (vol < 1000000) continue;
        logMsg(`${sym}: ${gain > 0 ? '+' : ''}${gain.toFixed(1)}%`);
        results.top.push({ sym, price, gain24h: gain, vol24h: vol, type: 'TOP', tags: [{ label: `${gain > 0 ? '+' : ''}${gain.toFixed(1)}%`, cls: gain > 0 ? 'g' : 'r' }, { label: `Vol $${(vol / 1e6).toFixed(0)}M`, cls: '' }] });
        await sleep(100);
      }
    }

    // ── ACCUM SCAN ──────────────────────────────
    async function scanAccumulation() {
      const candidates = await preFilterCoins('accum');
      logMsg(`Starting deep analysis on ${candidates.length} coins...`, 'info');
      let processed = 0;
      for (const sym of candidates) {
        processed++; logMsg(`[${processed}/${candidates.length}] 🔬 ${sym}...`);
        try {
          const d = await analyzeCoin(sym);
          const smartAcc = detectSmartAccumulation(d, d.klines4h, d.klines1d, d.oiData);
          if (smartAcc.score >= 6 || smartAcc.signals.some(s => s.strength === 'strong')) {
            logMsg(`✅ ${sym}: Score ${smartAcc.score}/${ACCUM_MAX_SCORE}`, 'ok');
            results.accum.push({
              sym, price: d.price, score: smartAcc.score, scoreMax: ACCUM_MAX_SCORE,
              scorePct: Math.round(smartAcc.score / ACCUM_MAX_SCORE * 100), gain24h: d.gain24h,
              type: 'ACCUM', data: d, scoreData: smartAcc, signals: smartAcc.signals,
              tags: [
                { label: `Vol ${d.volRatio.toFixed(1)}x`, cls: d.volRatio >= 2 ? 'b' : '' },
                { label: `7D ${d.priceChg7d >= 0 ? '+' : ''}${d.priceChg7d.toFixed(1)}%`, cls: '' },
                { label: `RSI ${d.rsi4h}`, cls: d.rsi4h < 40 ? 'g' : d.rsi4h > 65 ? 'r' : '' },
                d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: d.funding < THRESHOLDS.FUNDING_NEG ? 'b' : '' } : null,
                d.oiData?.change24h > 5 ? { label: `OI +${d.oiData.change24h.toFixed(1)}%`, cls: 'b' } : null,
                smartAcc.signals.slice(0, 1).map(x => ({ label: x.type.split('_')[0].toUpperCase(), cls: x.strength === 'strong' ? 'g' : 'a' }))[0]
              ].filter(Boolean)
            });
            renderCards(); updateStats();
          }
        } catch (e) { logMsg(`❌ ${sym}: ${e.message}`, 'bad'); }
        await sleep(350);
      }
      document.getElementById('stScanned').textContent = processed;
    }

    // ── PUMP / SHORT SCAN ───────────────────────
    async function scanPumpShort(mode) {
      logMsg('Fetching CoinGecko top movers...');
      let cgCoins = [];
      try { cgCoins = await cg('coins/markets', { vs_currency: 'usd', order: 'percent_change_7d_desc', per_page: 100, page: 1, sparkline: false, price_change_percentage: '24h,7d' }); }
      catch (e) { logMsg('CoinGecko error, using Binance only', 'bad'); }
      const futs = await getFutSymbols();
      const candidates = cgCoins.filter(c => {
        const sym = c.symbol.toUpperCase(), gain = c.price_change_percentage_7d_in_currency || 0, vol = c.total_volume || 0;
        return futs.has(sym) && gain >= 100 && vol >= 1000000 && !['USDC', 'BUSD', 'DAI', 'TUSD', 'USDT'].includes(sym);
      }).slice(0, 25);
      logMsg(`${candidates.length} pump candidates found. Analyzing...`, 'info');
      for (const c of candidates) {
        const sym = c.symbol.toUpperCase(), gain7d = c.price_change_percentage_7d_in_currency || 0;
        logMsg(`Checking ${sym}: +${gain7d.toFixed(0)}% (7D)...`);
        try {
          const d = await analyzeCoin(sym);
          if (mode === 'pump') {
            const s = detectSmartAccumulation(d, d.klines4h, d.klines1d, d.oiData);
            results.pump.push({ sym, price: d.price, score: gain7d, scoreMax: 100, scorePct: Math.min(gain7d / 10, 100), gain24h: d.gain24h, gain7d, type: 'PUMP', data: d, scoreData: s, tags: [{ label: `+${gain7d.toFixed(0)}% 7D`, cls: 'g' }, { label: `${d.gain24h >= 0 ? '+' : ''}${d.gain24h.toFixed(1)}% 24H`, cls: d.gain24h >= 0 ? 'g' : 'r' }, { label: `RSI ${d.rsi4h}`, cls: d.rsi4h > 70 ? 'r' : '' }, d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: '' } : null].filter(Boolean) });
          } else {
            const pumpEx = detectPumpExhaustion(d, d.klines4h, d.klines1d), s = pumpEx;
            if (pumpEx.score >= 3) {
              results.short.push({ sym, price: d.price, score: pumpEx.score, scoreMax: 8, scorePct: Math.round(pumpEx.score / 8 * 100), gain24h: d.gain24h, gain7d, type: 'SHORT', data: d, scoreData: pumpEx, signals: pumpEx.signals, tags: [{ label: `+${gain7d.toFixed(0)}% 7D`, cls: 'r' }, { label: `RSI ${d.rsi4h}`, cls: d.rsi4h > 65 ? 'r' : '' }, d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: d.funding > THRESHOLDS.FUNDING_POS ? 'r' : '' } : null, pumpEx.signals.slice(0, 1).map(x => ({ label: x.type.split('_')[0].toUpperCase(), cls: x.strength === 'strong' ? 'r' : '' }))[0], { label: `SL $${d.sl.toPrecision(4)}`, cls: '' }].filter(Boolean) });
              logMsg(`✓ ${sym} — short score ${pumpEx.score}/8`, 'ok');
            }
          }
          renderCards(); updateStats();
        } catch (e) { logMsg(`✗ ${sym}: ${e.message}`, 'bad'); }
        await sleep(500);
      }
      document.getElementById('stScanned').textContent = candidates.length;
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER CARDS (FIXED onclick handler)
    // ═══════════════════════════════════════════════════════════════
    function renderCards() {
      const allResults = [...results.accum.map(r => ({ ...r, _type: 'ACCUM' })), ...results.pump.map(r => ({ ...r, _type: 'PUMP' })), ...results.short.map(r => ({ ...r, _type: 'SHORT' })), ...results.top.map(r => ({ ...r, _type: 'TOP' }))];
      const grid = document.getElementById('cardsGrid');
      if (allResults.length === 0 && !scanning) { grid.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-msg">No signals found</div><div class="empty-sub">Try a different scan mode</div></div>`; return; }
      allResults.sort((a, b) => (b.scorePct || 0) - (a.scorePct || 0));
      grid.innerHTML = allResults.map((r, i) => {
        const pillClass = { ACCUM: 'pill-accum', PUMP: 'pill-pump', SHORT: 'pill-short', TOP: 'pill-pump' }[r._type] || 'pill-pump',
          pillLabel = { ACCUM: 'Accumulation', PUMP: 'Pump 5D', SHORT: 'Short', TOP: 'Top Mover' }[r._type] || r._type,
          fillCls = (r.scorePct || 0) >= 70 ? 'high' : (r.scorePct || 0) >= 40 ? 'mid' : 'low';
        const tagsHtml = (r.tags || []).map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join(''),
          chart = `https://www.tradingview.com/chart/?symbol=BINANCE:${r.sym}USDT.P`,
          hasDetail = r.data && r.scoreData;
        // ✅ FIXED: onclick handler properly sets input value then calls runQuickScan
        return `<div class="card" style="animation-delay:${i * 0.04}s" onclick="document.getElementById('symInput').value='${r.sym}'; runQuickScan();">
          <div class="card-type"><span class="pill ${pillClass}">${pillLabel}</span>${r.scorePct !== undefined ? `<div class="card-mini-bar"><div class="card-mini-fill ${fillCls}" style="width:${r.scorePct}%"></div></div>` : ''}${r.score !== undefined && r.scoreMax ? `<span style="font-family:var(--mono);font-size:0.65rem;color:var(--muted)">${typeof r.score === 'number' && r.scoreMax <= 100 ? r.score + '/' + r.scoreMax : ''}</span>` : ''}</div>
          <div class="card-body"><div class="card-sym">${r.sym}/USDT</div><div class="card-tags">${tagsHtml}</div></div>
          <div class="card-right"><div class="card-time">$${Number(r.price).toPrecision(5)}</div>${hasDetail ? `<button class="btn-sm" onclick="event.stopPropagation(); renderResult('${r.sym}', r.data, r.scoreData, '${r._type}'); window.scrollTo({top:0,behavior:'smooth'});">Detail</button>` : ''}<br><a class="btn-sm" href="${chart}" target="_blank" style="margin-top:5px">Chart ↗</a></div>
        </div>`;
      }).join('');
      window._scanResults = allResults;
    }

    // ═══════════════════════════════════════════════════════════════
    // UTILS + EXPORT
    // ═══════════════════════════════════════════════════════════════
    function showDetail(sym, idx) { const r = window._scanResults?.[idx]; if (!r || !r.data || !r.scoreData) return; renderResult(sym, r.data, r.scoreData, r._type); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function updateStats() { const all = results.accum.length + results.pump.length + results.short.length + results.top.length; document.getElementById('stTotal').textContent = all || '—'; document.getElementById('stAccum').textContent = results.accum.length || '—'; document.getElementById('stPump').textContent = results.pump.length || '—'; document.getElementById('stShort').textContent = results.short.length || '—'; }
    function showSkeletons() { document.getElementById('cardsGrid').innerHTML = [1, 2, 3].map(() => `<div class="skel-card"><div class="skel" style="width:88px;height:42px;border-radius:6px;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px;"><div class="skel" style="height:16px;width:100px;"></div><div class="skel" style="height:12px;width:160px;"></div></div></div>`).join(''); }
    function setDot(state) { const d = document.getElementById('liveDot'); d.className = 'live-dot ' + state; }

    async function getFutSymbols() {
      if (futSymbols.size > 0) return futSymbols;
      const data = await binance('exchangeInfo', {}, 20);
      futSymbols = new Set(data.symbols.filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT').map(s => s.baseAsset));
      return futSymbols;
    }
    let futSymbols = new Set();

    function exportResults(mode) {
      const data = mode === 'all' ? [...results.accum, ...results.pump, ...results.short, ...results.top] : results[mode] || [];
      if (!data.length) return alert('No data to export');
      const headers = ['Symbol', 'Price', 'Score', '24h%', '7D%', 'RSI', 'Funding', 'OI24h', 'Signals'],
        rows = data.map(r => [r.sym, r.price, `${r.score || '-'}/${r.scoreMax || '-'}`, `${r.gain24h >= 0 ? '+' : ''}${r.gain24h?.toFixed(1) || '-'}%`, `${r.data?.priceChg7d >= 0 ? '+' : ''}${r.data?.priceChg7d?.toFixed(1) || '-'}%`, r.data?.rsi4h || '-', r.data?.funding !== null ? `${r.data.funding >= 0 ? '+' : ''}${r.data.funding.toFixed(3)}%` : 'N/A', r.data?.oiData?.change24h !== undefined ? `${r.data.oiData.change24h >= 0 ? '+' : ''}${r.data.oiData.change24h.toFixed(1)}%` : 'N/A', (r.signals?.map(s => s.type).join(';') || '-')]);
      const csv = [headers, ...rows].map(row => row.join(',')).join('\n'),
        blob = new Blob([csv], { type: 'text/csv' }),
        url = URL.createObjectURL(blob),
        a = document.createElement('a');
      a.href = url; a.download = `pawby_pro_${mode}_${Date.now()}.csv`; a.click(); URL.revokeObjectURL(url);
    }

    // ✅ Initialize: Clear old cache from previous versions
    (function init() {
      // Clear old cache keys
      Object.keys(localStorage).filter(k => k.startsWith('hervin_')).forEach(k => localStorage.removeItem(k));
      logMsg('🚀 PAWBY  initialized', 'ok');
    })();
  </script>
