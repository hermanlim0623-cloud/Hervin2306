<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hervin Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --border:    #e4e1d9;
  --border2:   #d0ccC2;
  --text:      #18170f;
  --muted:     #8c8979;
  --faint:     #b8b4a8;

  --g:         #1a6b3e;
  --g-bg:      #eef7f2;
  --g-border:  #b8dfc9;
  --r:         #b02020;
  --r-bg:      #fdf0ef;
  --r-border:  #f0c4c4;
  --a:         #8a5c00;
  --a-bg:      #fdf6e3;
  --a-border:  #e8d49a;
  --b:         #1a4a80;
  --b-bg:      #eef3fb;
  --b-border:  #b8cee8;

  --mono: 'Geist Mono', monospace;
  --sans: 'Syne', sans-serif;
  --r8: 8px;
  --r12: 12px;
}

html { font-size: 14px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.hdr-l { display: flex; align-items: center; gap: 12px; }
.hdr-title {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.hdr-badge {
  font-family: var(--mono);
  font-size: 0.65rem;
  background: var(--text);
  color: #fff;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}
.hdr-r { display: flex; align-items: center; gap: 10px; }
.clock {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--muted);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--faint);
  transition: background 0.4s;
}
.live-dot.active { background: var(--g); animation: blink 2s ease-in-out infinite; }
.live-dot.loading { background: var(--a); }
.live-dot.error   { background: var(--r); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ── LAYOUT ── */
.wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 80px; }

/* ── SCAN BAR ── */
.scan-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r12);
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.scan-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  white-space: nowrap;
}
.sym-input {
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 500;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r8);
  padding: 9px 14px;
  color: var(--text);
  width: 140px;
  text-transform: uppercase;
  outline: none;
  letter-spacing: 0.05em;
  transition: border-color 0.15s;
}
.sym-input:focus { border-color: var(--text); }
.sym-input::placeholder { text-transform: none; font-weight: 300; letter-spacing: 0; color: var(--faint); }
.btn {
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: var(--r8);
  padding: 9px 16px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  background: var(--surface);
  color: var(--text);
}
.btn:hover { background: var(--bg); border-color: var(--border2); }
.btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn.primary:hover { opacity: 0.8; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.scan-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

/* ── MARKET SCAN BUTTON ── */
.market-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.mode-btn {
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 600;
  border-radius: var(--r8);
  padding: 10px 18px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 7px;
}
.mode-btn:hover { border-color: var(--border2); color: var(--text); }
.mode-btn.running { border-color: var(--a-border); background: var(--a-bg); color: var(--a); }
.mode-btn.done    { border-color: var(--g-border); background: var(--g-bg); color: var(--g); }
.mode-icon { font-size: 1rem; }

/* ── STATS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r8);
  padding: 14px 16px;
}
.stat-l {
  font-size: 0.67rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat-v {
  font-family: var(--mono);
  font-size: 1.35rem;
  font-weight: 500;
  line-height: 1;
  color: var(--text);
}
.stat-v.blue  { color: var(--b); }
.stat-v.green { color: var(--g); }
.stat-v.red   { color: var(--r); }
.stat-v.amber { color: var(--a); }

/* ── RESULT PANEL (single coin) ── */
.result-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r12);
  margin-bottom: 20px;
  overflow: hidden;
  display: none;
  animation: slideIn 0.2s ease;
}
.result-panel.show { display: block; }
@keyframes slideIn {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}
.rp-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.rp-sym {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 500;
}
.rp-price {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--muted);
}
.btn-close {
  background: none; border: none; cursor: pointer;
  color: var(--faint); font-size: 1.1rem; line-height: 1;
  transition: color 0.15s;
}
.btn-close:hover { color: var(--text); }
.rp-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

/* metric row inside result panel */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.metric {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r8);
  padding: 12px 14px;
}
.metric-l { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.metric-v { font-family: var(--mono); font-size: 0.95rem; font-weight: 500; }
.metric-v.green { color: var(--g); }
.metric-v.red   { color: var(--r); }
.metric-v.amber { color: var(--a); }
.metric-v.blue  { color: var(--b); }

/* checklist */
.checklist { display: flex; flex-direction: column; gap: 6px; }
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.82rem;
  padding: 8px 12px;
  border-radius: var(--r8);
  background: var(--bg);
}
.check-row.pass { background: var(--g-bg); }
.check-row.fail { background: var(--r-bg); }
.check-row.warn { background: var(--a-bg); }
.check-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
.check-text { line-height: 1.4; }

/* score bar */
.score-section { display: flex; align-items: center; gap: 12px; }
.score-label { font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
.score-track {
  flex: 1; height: 6px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.score-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s ease;
}
.score-fill.high { background: var(--g); }
.score-fill.mid  { background: var(--a); }
.score-fill.low  { background: var(--r); }
.score-val { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

.verdict {
  padding: 12px 16px;
  border-radius: var(--r8);
  font-size: 0.88rem;
  font-weight: 600;
}
.verdict.strong { background: var(--g-bg); color: var(--g); border: 1px solid var(--g-border); }
.verdict.medium { background: var(--a-bg); color: var(--a); border: 1px solid var(--a-border); }
.verdict.weak   { background: var(--r-bg); color: var(--r); border: 1px solid var(--r-border); }
.verdict.neutral { background: var(--b-bg); color: var(--b); border: 1px solid var(--b-border); }

.chart-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: var(--r8);
  padding: 8px 16px;
  background: var(--bg);
  transition: all 0.15s;
  width: fit-content;
}
.chart-link:hover { border-color: var(--border2); background: var(--border); }

/* ── SIGNAL CARDS LIST ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.cards { display: flex; flex-direction: column; gap: 8px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r12);
  padding: 16px 18px;
  display: grid;
  grid-template-columns: 88px 1fr auto;
  gap: 14px;
  align-items: center;
  transition: border-color 0.15s, box-shadow 0.15s;
  animation: fadeUp 0.25s ease both;
}
.card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-type {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}
.pill {
  font-family: var(--mono);
  font-size: 0.64rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.pill-accum   { background: var(--b-bg); color: var(--b); border: 1px solid var(--b-border); }
.pill-pump    { background: var(--g-bg); color: var(--g); border: 1px solid var(--g-border); }
.pill-short   { background: var(--r-bg); color: var(--r); border: 1px solid var(--r-border); }
.pill-reversal { background: var(--a-bg); color: var(--a); border: 1px solid var(--a-border); }

.card-mini-bar { width: 60px; height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
.card-mini-fill { height: 100%; border-radius: 2px; }

.card-body { min-width: 0; }
.card-sym {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 500;
  margin-bottom: 5px;
  letter-spacing: -0.01em;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  font-family: var(--mono);
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--bg);
  white-space: nowrap;
}
.tag.g { border-color: var(--g-border); color: var(--g); background: var(--g-bg); }
.tag.r { border-color: var(--r-border); color: var(--r); background: var(--r-bg); }
.tag.a { border-color: var(--a-border); color: var(--a); background: var(--a-bg); }
.tag.b { border-color: var(--b-border); color: var(--b); background: var(--b-bg); }

.card-right { text-align: right; }
.card-time { font-family: var(--mono); font-size: 0.68rem; color: var(--faint); margin-bottom: 8px; }
.btn-sm {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
  text-decoration: none;
  display: inline-block;
}
.btn-sm:hover { background: var(--border); }

/* ── EMPTY / LOADING ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--faint);
}
.empty-icon { font-size: 1.8rem; margin-bottom: 8px; }
.empty-msg { font-size: 0.85rem; }
.empty-sub { font-size: 0.75rem; margin-top: 4px; color: var(--faint); }

.skel {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
}
@keyframes shimmer { to { background-position: -300% 0; } }

.skel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r12);
  padding: 16px 18px;
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 8px;
}

/* ── PROGRESS LOG ── */
.scan-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r12);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: none;
}
.scan-log.show { display: block; }
.log-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
.log-lines { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
.log-line { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
.log-line.ok  { color: var(--g); }
.log-line.bad { color: var(--r); }
.log-line.info { color: var(--b); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(3, 1fr); }
  .stat:nth-child(4), .stat:nth-child(5) { display: none; }
  .card { grid-template-columns: 72px 1fr; }
  .card-right { display: none; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .scan-bar { gap: 8px; }
  .sym-input { width: 120px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-l">
    <div class="live-dot" id="liveDot"></div>
    <span class="hdr-title">Hervin Scanner</span>
    <span class="hdr-badge">v6</span>
  </div>
  <div class="hdr-r">
    <span class="clock" id="clock">--:-- UTC</span>
  </div>
</header>

<div class="wrap">

  <!-- QUICK SYMBOL SCAN -->
  <div class="scan-bar">
    <span class="scan-label">Quick Scan</span>
    <input class="sym-input" id="symInput" placeholder="e.g. SOL"
           onkeydown="if(event.key==='Enter') runQuickScan()">
    <button class="btn primary" onclick="runQuickScan()">Scan</button>
    <div class="scan-divider"></div>
    <button class="btn" onclick="runShortCheck()">Short Check</button>
    <button class="btn" onclick="runAccumCheck()">Accum Check</button>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-panel" id="resultPanel">
    <div class="rp-head">
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="rp-sym" id="rpSym">—</span>
        <span class="rp-price" id="rpPrice"></span>
      </div>
      <button class="btn-close" onclick="closeResult()">✕</button>
    </div>
    <div class="rp-body" id="rpBody"></div>
  </div>

  <!-- MARKET SCAN BUTTONS -->
  <div class="market-row">
    <button class="mode-btn" id="btnAccumScan" onclick="runMarketScan('accum')">
      <span class="mode-icon">◉</span> Accumulation Scan
    </button>
    <button class="mode-btn" id="btnPumpScan" onclick="runMarketScan('pump')">
      <span class="mode-icon">▲</span> Pump Scan (5D)
    </button>
    <button class="mode-btn" id="btnShortScan" onclick="runMarketScan('short')">
      <span class="mode-icon">▼</span> Short Scan
    </button>
    <button class="mode-btn" id="btnTopScan" onclick="runMarketScan('top')">
      <span class="mode-icon">⚡</span> Top Movers
    </button>
  </div>

  <!-- SCAN PROGRESS LOG -->
  <div class="scan-log" id="scanLog">
    <div class="log-title">Scan Progress</div>
    <div class="log-lines" id="logLines"></div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-l">Found</div><div class="stat-v" id="stTotal">—</div></div>
    <div class="stat"><div class="stat-l">Accumulation</div><div class="stat-v blue" id="stAccum">—</div></div>
    <div class="stat"><div class="stat-l">Pump</div><div class="stat-v green" id="stPump">—</div></div>
    <div class="stat"><div class="stat-l">Short</div><div class="stat-v red" id="stShort">—</div></div>
    <div class="stat"><div class="stat-l">Scanned</div><div class="stat-v" id="stScanned">—</div></div>
  </div>

  <!-- RESULTS LIST -->
  <div class="section-head">
    <span class="section-title" id="sectionTitle">Run a scan to find signals</span>
  </div>
  <div class="cards" id="cardsGrid">
    <div class="empty">
      <div class="empty-icon">◎</div>
      <div class="empty-msg">No signals yet</div>
      <div class="empty-sub">Click a scan mode above to start</div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════

const FAPI = 'https://fapi.binance.com/fapi/v1';
const CG   = 'https://api.coingecko.com/api/v3';

async function binance(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `${FAPI}/${path}${qs ? '?' + qs : ''}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Binance ${r.status}`);
  return r.json();
}

async function cg(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `${CG}/${path}${qs ? '?' + qs : ''}`;
  const r = await fetch(url);
  if (r.status === 429) { await sleep(30000); return cg(path, params); }
  if (!r.ok) throw new Error(`CG ${r.status}`);
  return r.json();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getUTCHours()).padStart(2,'0')}:${String(n.getUTCMinutes()).padStart(2,'0')}:${String(n.getUTCSeconds()).padStart(2,'0')} UTC`;
}, 1000);

// ═══════════════════════════════════════════
// LOG
// ═══════════════════════════════════════════
function logMsg(msg, type = '') {
  const el = document.getElementById('logLines');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `${new Date().toUTCString().slice(17,25)} — ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function showLog() { document.getElementById('scanLog').classList.add('show'); }
function hideLog() { document.getElementById('scanLog').classList.remove('show'); }
function clearLog() { document.getElementById('logLines').innerHTML = ''; }

// ═══════════════════════════════════════════
// TECHNICAL INDICATORS
// ═══════════════════════════════════════════

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  let ag = gains / period, al = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    ag = (ag * (period-1) + (d > 0 ? d : 0)) / period;
    al = (al * (period-1) + (d < 0 ? -d : 0)) / period;
  }
  return al === 0 ? 100 : Math.round(100 - 100 / (1 + ag / al));
}

function calcATR(klines, period = 14) {
  if (klines.length < period + 1) return 0;
  const trs = [];
  for (let i = 1; i < klines.length; i++) {
    const h = parseFloat(klines[i][2]);
    const l = parseFloat(klines[i][3]);
    const pc = parseFloat(klines[i-1][4]);
    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
  }
  return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcMA(arr, period) {
  if (arr.length < period) return arr[arr.length-1] || 0;
  return arr.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function detectBullishDivergence(klines) {
  if (klines.length < 25) return false;
  const closes = klines.map(k => parseFloat(k[4]));
  const lows   = klines.map(k => parseFloat(k[3]));
  // Simple: last 20 candles — price lower low but RSI not lower
  const recent = 20;
  const c = closes.slice(-recent);
  const l = lows.slice(-recent);
  const rsi1 = calcRSI(c.slice(0, 10));
  const rsi2 = calcRSI(c);
  const priceLow1 = Math.min(...l.slice(0, 10));
  const priceLow2 = Math.min(...l.slice(10));
  return priceLow2 < priceLow1 && rsi2 > rsi1;
}

function detectBearishDivergence(klines) {
  if (klines.length < 25) return false;
  const closes = klines.map(k => parseFloat(k[4]));
  const highs  = klines.map(k => parseFloat(k[2]));
  const recent = 20;
  const c = closes.slice(-recent);
  const h = highs.slice(-recent);
  const rsi1 = calcRSI(c.slice(0, 10));
  const rsi2 = calcRSI(c);
  const hi1 = Math.max(...h.slice(0, 10));
  const hi2 = Math.max(...h.slice(10));
  return hi2 > hi1 && rsi2 < rsi1;
}

let futSymbols = new Set();
async function getFutSymbols() {
  if (futSymbols.size > 0) return futSymbols;
  const data = await binance('exchangeInfo');
  futSymbols = new Set(
    data.symbols
      .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT')
      .map(s => s.baseAsset)
  );
  return futSymbols;
}

// ═══════════════════════════════════════════
// SINGLE COIN ANALYSIS
// ═══════════════════════════════════════════

async function analyzeCoin(symbol) {
  const [ticker, klines4h, klines1d, ob] = await Promise.all([
    binance('ticker/24hr', { symbol: symbol + 'USDT' }),
    binance('klines', { symbol: symbol + 'USDT', interval: '4h', limit: 60 }),
    binance('klines', { symbol: symbol + 'USDT', interval: '1d', limit: 30 }),
    binance('depth', { symbol: symbol + 'USDT', limit: 20 }),
  ]);

  const price   = parseFloat(ticker.lastPrice);
  const gain24h = parseFloat(ticker.priceChangePercent);
  const high24h = parseFloat(ticker.highPrice);
  const vol24h  = parseFloat(ticker.quoteVolume);

  // Funding rate
  let funding = null;
  try {
    const fi = await binance('premiumIndex', { symbol: symbol + 'USDT' });
    funding = parseFloat(fi.lastFundingRate) * 100;
  } catch(e) {}

  // Kline data
  const closes4h  = klines4h.map(k => parseFloat(k[4]));
  const closes1d  = klines1d.map(k => parseFloat(k[4]));
  const vols1d    = klines1d.map(k => parseFloat(k[5]));

  const rsi4h  = calcRSI(closes4h);
  const rsi1d  = calcRSI(closes1d);
  const atr4h  = calcATR(klines4h);
  const ma20_4h = calcMA(closes4h, 20);
  const ma20_1d = calcMA(closes1d, 20);

  // Volume analysis (7d vs 30d avg)
  const vol7dAvg  = vols1d.slice(-7).reduce((a,b) => a+b, 0) / 7;
  const vol30dAvg = vols1d.reduce((a,b) => a+b, 0) / vols1d.length;
  const volRatio  = vol30dAvg > 0 ? vol7dAvg / vol30dAvg : 1;

  // Price change 7d
  const price7d     = closes1d.length >= 7 ? closes1d[closes1d.length-7] : price;
  const priceChg7d  = price7d > 0 ? ((price - price7d) / price7d * 100) : 0;
  const priceChg30d = closes1d[0] > 0 ? ((price - closes1d[0]) / closes1d[0] * 100) : 0;

  // Order book
  const bids = ob.bids ? ob.bids.slice(0,10).map(b => parseFloat(b[0]) * parseFloat(b[1])).reduce((a,b)=>a+b,0) : 0;
  const asks = ob.asks ? ob.asks.slice(0,10).map(a => parseFloat(a[0]) * parseFloat(a[1])).reduce((a,b)=>a+b,0) : 0;
  const bestBid = ob.bids?.[0]?.[0] ? parseFloat(ob.bids[0][0]) : price;
  const bestAsk = ob.asks?.[0]?.[0] ? parseFloat(ob.asks[0][0]) : price;
  const spread  = bestBid > 0 ? ((bestAsk - bestBid) / bestBid * 100) : 99;
  const liquid  = spread <= 2.0 && bids >= 50000;

  // Divergences
  const bullDiv = detectBullishDivergence(klines4h);
  const bearDiv = detectBearishDivergence(klines4h);

  // Trend
  const trend4h = price > ma20_4h ? 'bullish' : 'bearish';
  const trend1d = price > ma20_1d ? 'bullish' : 'bearish';

  // ATR SL/TP (for short)
  const sl = price + atr4h * 1.5;
  const tp = price - atr4h * 3.0;

  return {
    symbol, price, gain24h, high24h, vol24h,
    funding, rsi4h, rsi1d, atr4h,
    volRatio, priceChg7d, priceChg30d,
    bids, asks, spread, liquid,
    bullDiv, bearDiv, trend4h, trend1d,
    sl, tp, ma20_4h, ma20_1d
  };
}

// ═══════════════════════════════════════════
// ACCUM SCORE
// ═══════════════════════════════════════════

function scoreAccum(d) {
  const checks = [];
  let score = 0;

  // 1. Volume spike
  if (d.volRatio >= 2.0) {
    score++; checks.push({ pass: true,  text: `Volume 7D: ${d.volRatio.toFixed(1)}x rata-rata 30D — silent buying detected` });
  } else if (d.volRatio >= 1.4) {
    checks.push({ warn: true, text: `Volume 7D: ${d.volRatio.toFixed(1)}x avg — sedikit naik, belum kuat` });
  } else {
    checks.push({ fail: true, text: `Volume 7D: ${d.volRatio.toFixed(1)}x avg — normal, tidak ada akumulasi` });
  }

  // 2. Price still flat
  if (d.priceChg7d >= -15 && d.priceChg7d <= 20) {
    score++; checks.push({ pass: true,  text: `Harga 7D masih flat: ${d.priceChg7d > 0 ? '+' : ''}${d.priceChg7d.toFixed(1)}% — akumulasi diam-diam` });
  } else if (d.priceChg7d > 20) {
    checks.push({ warn: true, text: `Harga 7D sudah pump: +${d.priceChg7d.toFixed(1)}% — mungkin terlambat entry` });
  } else {
    checks.push({ fail: true, text: `Harga 7D turun: ${d.priceChg7d.toFixed(1)}% — sedang distribution` });
  }

  // 3. RSI Bullish Divergence
  if (d.bullDiv) {
    score++; checks.push({ pass: true,  text: `RSI Bullish Divergence (4H) — momentum naik diam-diam` });
  } else {
    checks.push({ fail: true, text: `Tidak ada RSI bullish divergence (4H)` });
  }

  // 4. RSI Oversold territory (not overbought)
  if (d.rsi4h < 45) {
    score++; checks.push({ pass: true,  text: `RSI 4H: ${d.rsi4h} — masih murah, ruang naik besar` });
  } else if (d.rsi4h < 65) {
    checks.push({ warn: true, text: `RSI 4H: ${d.rsi4h} — neutral, tidak oversold` });
  } else {
    checks.push({ fail: true, text: `RSI 4H: ${d.rsi4h} — sudah overbought, jangan entry sekarang` });
  }

  // 5. Funding negative
  if (d.funding !== null && d.funding < -0.01) {
    score++; checks.push({ pass: true,  text: `Funding: ${d.funding.toFixed(4)}% — negatif, shorts numpuk = squeeze fuel 🚀` });
  } else if (d.funding !== null) {
    checks.push({ warn: true, text: `Funding: ${d.funding.toFixed(4)}% — tidak negatif` });
  } else {
    checks.push({ fail: true, text: `Funding: N/A` });
  }

  // 6. Bid depth
  if (d.bids >= 150000) {
    score++; checks.push({ pass: true,  text: `Bid wall kuat: $${(d.bids/1000).toFixed(0)}K — support ada` });
  } else if (d.bids >= 50000) {
    checks.push({ warn: true, text: `Bid cukup: $${(d.bids/1000).toFixed(0)}K` });
  } else {
    checks.push({ fail: true, text: `Bid tipis: $${(d.bids/1000).toFixed(0)}K — support lemah` });
  }

  const pct  = Math.round(score / 6 * 100);
  const cls  = score >= 5 ? 'high' : score >= 3 ? 'mid' : 'low';
  const verdict = score >= 5
    ? { cls: 'strong', text: '🟢 AKUMULASI KUAT — Potensi pump besar, mulai watchlist ketat' }
    : score >= 3
    ? { cls: 'medium', text: '🟡 AKUMULASI SEDANG — Monitor terus, belum full signal' }
    : { cls: 'weak',   text: '⚪ Signal lemah — Skip atau cari yang lebih kuat' };

  return { score, max: 6, pct, cls, checks, verdict };
}

// ═══════════════════════════════════════════
// SHORT SCORE
// ═══════════════════════════════════════════

function scoreShort(d) {
  const checks = [];
  let score = 0;
  const drop = d.high24h > 0 ? ((d.high24h - d.price) / d.high24h * 100) : 0;

  if (d.gain24h >= 30) {
    score++; checks.push({ pass: true,  text: `Pump hari ini: +${d.gain24h.toFixed(1)}%` });
  } else {
    checks.push({ fail: true, text: `Gain 24H: ${d.gain24h.toFixed(1)}% — belum cukup pump` });
  }

  if (drop >= 5) {
    score++; checks.push({ pass: true,  text: `Drop dari high: -${drop.toFixed(1)}% — mulai reversal` });
  } else {
    checks.push({ fail: true, text: `Drop dari high: -${drop.toFixed(1)}% — belum reversal` });
  }

  if (d.funding !== null && d.funding > 0.05) {
    score++; checks.push({ pass: true,  text: `Funding: +${d.funding.toFixed(4)}% — longs paying, bearish` });
  } else if (d.funding !== null && d.funding < -0.05) {
    checks.push({ warn: true, text: `Funding: ${d.funding.toFixed(4)}% — NEGATIF, hati-hati squeeze!` });
  } else {
    checks.push({ fail: true, text: `Funding: ${d.funding !== null ? d.funding.toFixed(4) : 'N/A'}% — belum bullish enough` });
  }

  if (d.liquid) {
    score++; checks.push({ pass: true,  text: `Liquid — spread ${d.spread.toFixed(2)}%, bid $${(d.bids/1000).toFixed(0)}K` });
  } else {
    checks.push({ warn: true, text: `Liquidity rendah — spread ${d.spread.toFixed(2)}%` });
  }

  if (d.rsi4h > 65) {
    score++; checks.push({ pass: true,  text: `RSI 4H overbought: ${d.rsi4h} — momen balik` });
  } else {
    checks.push({ fail: true, text: `RSI 4H: ${d.rsi4h} — belum overbought` });
  }

  if (d.bearDiv) {
    score++; checks.push({ pass: true,  text: `RSI Bearish Divergence (4H) — momentum melemah` });
  } else {
    checks.push({ fail: true, text: `Tidak ada bearish divergence (4H)` });
  }

  if (d.trend1d === 'bearish') {
    score++; checks.push({ pass: true,  text: `Trend 1D bearish (price < MA20)` });
  } else {
    checks.push({ fail: true, text: `Trend 1D masih bullish — counter-trend risk` });
  }

  const pct = Math.round(score / 7 * 100);
  const cls = score >= 5 ? 'high' : score >= 3 ? 'mid' : 'low';
  const verdict = score >= 5
    ? { cls: 'strong', text: `🟢 LAYAK SHORT — SL $${d.sl.toPrecision(5)} | TP $${d.tp.toPrecision(5)}` }
    : score >= 3
    ? { cls: 'medium', text: '🟡 TUNGGU — Konfirmasi lebih banyak dulu' }
    : { cls: 'weak',   text: '🔴 SKIP — Signal tidak cukup kuat' };

  return { score, max: 7, pct, cls, checks, verdict };
}

let scanning = false;
const results = { accum: [], pump: [], short: [], top: [] };

async function runMarketScan(mode) {
  if (scanning) return;
  scanning = true;

  const btnId = { accum: 'btnAccumScan', pump: 'btnPumpScan', short: 'btnShortScan', top: 'btnTopScan' }[mode];
  const btn = document.getElementById(btnId);
  btn.classList.add('running');

  showLog(); clearLog();
  setDot('loading');
  showSkeletons();
  results[mode] = [];
  updateStats();

  const modeTitle = { accum:'Accumulation Scan', pump:'Pump Scan (5D)', short:'Short Scan', top:'Top Movers' }[mode];
  document.getElementById('sectionTitle').textContent = modeTitle;

  try {
    if (mode === 'top') {
      await scanTopMovers();
    } else if (mode === 'accum') {
      await scanAccumulation();
    } else if (mode === 'pump' || mode === 'short') {
      await scanPumpShort(mode);
    }
  } catch(e) {
    logMsg(`Error: ${e.message}`, 'bad');
    setDot('error');
  }

  scanning = false;
  btn.classList.remove('running');
  btn.classList.add('done');
  setTimeout(() => btn.classList.remove('done'), 3000);
  setDot('active');
  renderCards();
  updateStats();
  logMsg('Scan complete.', 'ok');
}

// ── TOP MOVERS ──────────────────────────────
async function scanTopMovers() {
  logMsg('Fetching Binance Futures 24h tickers...');
  const tickers = await binance('ticker/24hr');
  const usdt = tickers
    .filter(t => t.symbol.endsWith('USDT') && !['BUSD','USDC','DAI','TUSD'].some(s => t.symbol.includes(s)))
    .sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent))
    .slice(0, 20);

  logMsg(`Top 20 fetched. Analyzing...`, 'info');

  for (const t of usdt.slice(0, 15)) {
    const sym  = t.symbol.replace('USDT', '');
    const gain = parseFloat(t.priceChangePercent);
    const price = parseFloat(t.lastPrice);
    const vol  = parseFloat(t.quoteVolume);
    if (vol < 1_000_000) continue;

    logMsg(`${sym}: ${gain > 0 ? '+' : ''}${gain.toFixed(1)}%`);
    results.top.push({ sym, price, gain24h: gain, vol24h: vol, type: 'TOP', tags: [
      { label: `${gain > 0 ? '+' : ''}${gain.toFixed(1)}%`, cls: gain > 0 ? 'g' : 'r' },
      { label: `Vol $${(vol/1e6).toFixed(0)}M`, cls: '' },
    ]});
    await sleep(100);
  }
}

// ── ACCUM SCAN ──────────────────────────────
async function scanAccumulation() {
  logMsg('Fetching all futures tickers...');
  const tickers = await binance('ticker/24hr');
  const usdt = tickers
    .filter(t => t.symbol.endsWith('USDT')
      && !['BUSD','USDC','DAI','TUSD'].some(s => t.symbol.includes(s))
      && parseFloat(t.quoteVolume) >= 500_000
      && parseFloat(t.priceChangePercent) >= -15
      && parseFloat(t.priceChangePercent) <= 25
    )
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, 40);

  logMsg(`${usdt.length} candidates (price flat + volume OK). Deep scanning...`, 'info');
  let checked = 0;

  for (const t of usdt) {
    const sym = t.symbol.replace('USDT','');
    checked++;
    logMsg(`[${checked}/${usdt.length}] Checking ${sym}...`);

    try {
      const d = await analyzeCoin(sym);
      const s = scoreAccum(d);

      if (s.score >= 3) {
        logMsg(`✓ ${sym} — score ${s.score}/6`, 'ok');
        results.accum.push({
          sym, price: d.price, score: s.score, scoreMax: 6, scorePct: s.pct,
          gain24h: d.gain24h, type: 'ACCUM', data: d, scoreData: s,
          tags: [
            { label: `Vol ${d.volRatio.toFixed(1)}x`, cls: d.volRatio >= 2 ? 'b' : '' },
            { label: `7D ${d.priceChg7d >= 0 ? '+' : ''}${d.priceChg7d.toFixed(1)}%`, cls: '' },
            { label: `RSI ${d.rsi4h}`, cls: d.rsi4h < 40 ? 'g' : d.rsi4h > 65 ? 'r' : '' },
            d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: d.funding < -0.01 ? 'b' : '' } : null,
            d.bullDiv ? { label: 'Bull Div', cls: 'g' } : null,
          ].filter(Boolean)
        });
        renderCards(); updateStats();
      }
    } catch(e) {
      logMsg(`✗ ${sym}: ${e.message}`, 'bad');
    }

    await sleep(300);
  }

  document.getElementById('stScanned').textContent = checked;
}

// ── PUMP / SHORT SCAN ───────────────────────
async function scanPumpShort(mode) {
  logMsg('Fetching CoinGecko top movers...');
  let cgCoins = [];
  try {
    cgCoins = await cg('coins/markets', {
      vs_currency: 'usd', order: 'percent_change_7d_desc',
      per_page: 100, page: 1, sparkline: false,
      price_change_percentage: '24h,7d'
    });
  } catch(e) {
    logMsg('CoinGecko error, using Binance only', 'bad');
  }

  const futs = await getFutSymbols();
  const candidates = cgCoins
    .filter(c => {
      const sym  = c.symbol.toUpperCase();
      const gain = c.price_change_percentage_7d_in_currency || 0;
      const vol  = c.total_volume || 0;
      return futs.has(sym) && gain >= 100 && vol >= 1_000_000
        && !['USDC','BUSD','DAI','TUSD','USDT'].includes(sym);
    })
    .slice(0, 20);

  logMsg(`${candidates.length} pump candidates found. Analyzing...`, 'info');

  for (const c of candidates) {
    const sym = c.symbol.toUpperCase();
    const gain7d = c.price_change_percentage_7d_in_currency || 0;
    logMsg(`Checking ${sym}: +${gain7d.toFixed(0)}% (7D)...`);

    try {
      const d = await analyzeCoin(sym);

      if (mode === 'pump') {
        const s = scoreAccum(d); // reuse accum for pump confirmation
        results.pump.push({
          sym, price: d.price, score: gain7d, scoreMax: 100, scorePct: Math.min(gain7d / 10, 100),
          gain24h: d.gain24h, gain7d, type: 'PUMP', data: d, scoreData: s,
          tags: [
            { label: `+${gain7d.toFixed(0)}% 7D`, cls: 'g' },
            { label: `${d.gain24h >= 0 ? '+' : ''}${d.gain24h.toFixed(1)}% 24H`, cls: d.gain24h >= 0 ? 'g' : 'r' },
            { label: `RSI ${d.rsi4h}`, cls: d.rsi4h > 70 ? 'r' : '' },
            d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: '' } : null,
          ].filter(Boolean)
        });
      } else {
        const s = scoreShort(d);
        if (s.score >= 2) {
          results.short.push({
            sym, price: d.price, score: s.score, scoreMax: 7, scorePct: s.pct,
            gain24h: d.gain24h, gain7d, type: 'SHORT', data: d, scoreData: s,
            tags: [
              { label: `+${gain7d.toFixed(0)}% 7D`, cls: 'r' },
              { label: `RSI ${d.rsi4h}`, cls: d.rsi4h > 65 ? 'r' : '' },
              d.funding !== null ? { label: `F: ${d.funding.toFixed(3)}%`, cls: d.funding > 0.05 ? 'r' : '' } : null,
              d.bearDiv ? { label: 'Bear Div', cls: 'r' } : null,
              { label: `SL $${d.sl.toPrecision(4)}`, cls: '' },
            ].filter(Boolean)
          });
          logMsg(`✓ ${sym} — short score ${s.score}/7`, 'ok');
        }
      }

      renderCards(); updateStats();
    } catch(e) {
      logMsg(`✗ ${sym}: ${e.message}`, 'bad');
    }

    await sleep(600);
  }

  document.getElementById('stScanned').textContent = candidates.length;
}

// ═══════════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════════

function renderCards() {
  const allResults = [
    ...results.accum.map(r => ({...r, _type:'ACCUM'})),
    ...results.pump.map(r => ({...r, _type:'PUMP'})),
    ...results.short.map(r => ({...r, _type:'SHORT'})),
    ...results.top.map(r => ({...r, _type:'TOP'})),
  ];

  const grid = document.getElementById('cardsGrid');

  if (allResults.length === 0 && !scanning) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-msg">No signals found</div><div class="empty-sub">Try a different scan mode</div></div>`;
    return;
  }

  // Sort: accum score desc, then pump gain desc
  allResults.sort((a, b) => (b.scorePct || 0) - (a.scorePct || 0));

  grid.innerHTML = allResults.map((r, i) => {
    const pillClass = { ACCUM:'pill-accum', PUMP:'pill-pump', SHORT:'pill-short', TOP:'pill-pump', REVERSAL:'pill-reversal' }[r._type] || 'pill-pump';
    const pillLabel = { ACCUM:'Accumulation', PUMP:'Pump 5D', SHORT:'Short', TOP:'Top Mover' }[r._type] || r._type;
    const fillCls   = (r.scorePct||0) >= 70 ? '#1a6b3e' : (r.scorePct||0) >= 40 ? '#8a5c00' : '#b02020';

    const tagsHtml = (r.tags || []).map(t =>
      `<span class="tag ${t.cls}">${t.label}</span>`
    ).join('');

    const chart = `https://www.tradingview.com/chart/?symbol=BINANCE:${r.sym}USDT.P`;

    const hasDetail = r.data && r.scoreData;

    return `<div class="card" style="animation-delay:${i * 0.04}s">
      <div class="card-type">
        <span class="pill ${pillClass}">${pillLabel}</span>
        ${r.scorePct !== undefined ? `<div class="card-mini-bar"><div class="card-mini-fill" style="width:${r.scorePct}%;background:${fillCls}"></div></div>` : ''}
        ${r.score !== undefined && r.scoreMax ? `<span style="font-family:var(--mono);font-size:0.65rem;color:var(--muted)">${typeof r.score === 'number' && r.scoreMax <= 10 ? r.score + '/' + r.scoreMax : ''}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-sym">${r.sym}/USDT</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>
      <div class="card-right">
        <div class="card-time">$${Number(r.price).toPrecision(5)}</div>
        ${hasDetail ? `<button class="btn-sm" onclick="showDetail('${r.sym}', ${i})">Detail</button>` : ''}
        <br><a class="btn-sm" href="${chart}" target="_blank" style="margin-top:5px">Chart ↗</a>
      </div>
    </div>`;
  }).join('');

  // Store for detail access
  window._scanResults = allResults;
}

function showDetail(sym, idx) {
  const r = window._scanResults?.[idx];
  if (!r || !r.data || !r.scoreData) return;
  renderResult(sym, r.data, r.scoreData, r._type);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════

function updateStats() {
  const all = results.accum.length + results.pump.length + results.short.length + results.top.length;
  document.getElementById('stTotal').textContent   = all || '—';
  document.getElementById('stAccum').textContent   = results.accum.length || '—';
  document.getElementById('stPump').textContent    = results.pump.length || '—';
  document.getElementById('stShort').textContent   = results.short.length || '—';
}

function showSkeletons() {
  document.getElementById('cardsGrid').innerHTML = [1,2,3].map(() => `
    <div class="skel-card">
      <div class="skel" style="width:88px;height:42px;border-radius:6px;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px;">
        <div class="skel" style="height:16px;width:100px;"></div>
        <div class="skel" style="height:12px;width:160px;"></div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════
// DOT STATE
// ═══════════════════════════════════════════

function setDot(state) {
  const d = document.getElementById('liveDot');
  d.className = 'live-dot ' + state;
}
</script>
