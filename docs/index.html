<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAWBY PRO v2 - Smart Money Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e1d9;
      --border2: #d0ccc2;
      --text: #18170f;
      --muted: #8c8979;
      --faint: #b8b4a8;
      --g: #1a6b3e;
      --g-bg: #eef7f2;
      --g-border: #b8dfc9;
      --r: #b02020;
      --r-bg: #fdf0ef;
      --r-border: #f0c4c4;
      --a: #8a5c00;
      --a-bg: #fdf6e3;
      --a-border: #e8d49a;
      --b: #1a4a80;
      --b-bg: #eef3fb;
      --b-border: #b8cee8;
      --mono: 'Geist Mono', monospace;
      --sans: 'Syne', sans-serif;
      --r8: 8px;
      --r12: 12px;
    }

    html {
      font-size: 14px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hdr-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hdr-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      background: var(--text);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .hdr-r {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--faint);
      transition: background 0.4s;
    }

    .live-dot.active {
      background: var(--g);
      animation: blink 2s ease-in-out infinite;
    }

    .live-dot.loading {
      background: var(--a);
    }

    .live-dot.error {
      background: var(--r);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.35
      }
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .scan-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .scan-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      white-space: nowrap;
    }

    .sym-input {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 9px 14px;
      color: var(--text);
      width: 140px;
      text-transform: uppercase;
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color 0.15s;
    }

    .sym-input:focus {
      border-color: var(--text);
    }

    .sym-input::placeholder {
      text-transform: none;
      font-weight: 300;
      letter-spacing: 0;
      color: var(--faint);
    }

    .btn {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 9px 16px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      background: var(--surface);
      color: var(--text);
    }

    .btn:hover {
      background: var(--bg);
      border-color: var(--border2);
    }

    .btn.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn.primary:hover {
      opacity: 0.8;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scan-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .market-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mode-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: var(--r8);
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .mode-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .mode-btn.running {
      border-color: var(--a-border);
      background: var(--a-bg);
      color: var(--a);
    }

    .mode-btn.done {
      border-color: var(--g-border);
      background: var(--g-bg);
      color: var(--g);
    }

    .mode-icon {
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 14px 16px;
    }

    .stat-l {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-v {
      font-family: var(--mono);
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1;
      color: var(--text);
    }

    .stat-v.blue {
      color: var(--b);
    }

    .stat-v.green {
      color: var(--g);
    }

    .stat-v.red {
      color: var(--r);
    }

    .stat-v.amber {
      color: var(--a);
    }

    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
      animation: slideIn 0.2s ease;
    }

    .result-panel.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rp-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .rp-sym {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
    }

    .rp-price {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.15s;
    }

    .btn-close:hover {
      color: var(--text);
    }

    .rp-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 12px 14px;
    }

    .metric-l {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .metric-v {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .metric-v.green {
      color: var(--g);
    }

    .metric-v.red {
      color: var(--r);
    }

    .metric-v.amber {
      color: var(--a);
    }

    .metric-v.blue {
      color: var(--b);
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: var(--r8);
      background: var(--bg);
    }

    .check-row.pass {
      background: var(--g-bg);
    }

    .check-row.fail {
      background: var(--r-bg);
    }

    .check-row.warn {
      background: var(--a-bg);
    }

    .check-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .check-text {
      line-height: 1.4;
    }

    .score-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .score-label {
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .score-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .score-fill.high {
      background: var(--g);
    }

    .score-fill.mid {
      background: var(--a);
    }

    .score-fill.low {
      background: var(--r);
    }

    .score-val {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .verdict {
      padding: 12px 16px;
      border-radius: var(--r8);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .verdict.strong {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-border);
    }

    .verdict.medium {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-border);
    }

    .verdict.weak {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-border);
    }

    .verdict.neutral {
      background: var(--b-bg);
      color: var(--b);
      border: 1px solid var(--b-border);
    }

    .chart-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--r8);
      padding: 8px 16px;
      background: var(--bg);
      transition: all 0.15s;
      width: fit-content;
    }

    .chart-link:hover {
      border-color: var(--border2);
      background: var(--border);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.25s ease both;
    }

    .card:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-type {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .pill-accum {
      background: var(--b-bg);
      color: var(--b);
      border: 1px solid var(--b-border);
    }

    .pill-pump {
      background: var(--g-bg);
      color: var(--g);
      border: 1px solid var(--g-border);
    }

    .pill-short {
      background: var(--r-bg);
      color: var(--r);
      border: 1px solid var(--r-border);
    }

    .pill-reversal {
      background: var(--a-bg);
      color: var(--a);
      border: 1px solid var(--a-border);
    }

    .card-mini-bar {
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .card-mini-fill {
      height: 100%;
      border-radius: 2px;
    }

    .card-body {
      min-width: 0;
    }

    .card-sym {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 5px;
      letter-spacing: -0.01em;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      white-space: nowrap;
    }

    .tag.g {
      border-color: var(--g-border);
      color: var(--g);
      background: var(--g-bg);
    }

    .tag.r {
      border-color: var(--r-border);
      color: var(--r);
      background: var(--r-bg);
    }

    .tag.a {
      border-color: var(--a-border);
      color: var(--a);
      background: var(--a-bg);
    }

    .tag.b {
      border-color: var(--b-border);
      color: var(--b);
      background: var(--b-bg);
    }

    .card-right {
      text-align: right;
    }

    .card-time {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--faint);
      margin-bottom: 8px;
    }

    .btn-sm {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-sm:hover {
      background: var(--border);
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--faint);
    }

    .empty-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .empty-msg {
      font-size: 0.85rem;
    }

    .empty-sub {
      font-size: 0.75rem;
      margin-top: 4px;
      color: var(--faint);
    }

    .skel {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      to {
        background-position: -300% 0;
      }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 8px;
    }

    .scan-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r12);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: none;
    }

    .scan-log.show {
      display: block;
    }

    .log-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .log-lines {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 120px;
      overflow-y: auto;
    }

    .log-line {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .log-line.ok {
      color: var(--g);
    }

    .log-line.bad {
      color: var(--r);
    }

    .log-line.info {
      color: var(--b);
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .stat:nth-child(4),
      .stat:nth-child(5) {
        display: none;
      }

      .card {
        grid-template-columns: 72px 1fr;
      }

      .card-right {
        display: none;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .scan-bar {
        gap: 8px;
      }

      .sym-input {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <header class="hdr">
    <div class="hdr-l">
      <div class="live-dot" id="liveDot"></div>
      <span class="hdr-title">PAWBY <span style="color:var(--a)">PRO</span> v2</span>
      <span class="hdr-badge">SMART MONEY</span>
    </div>
    <div class="hdr-r">
      <span class="clock" id="clock">--:-- UTC</span>
    </div>
  </header>
  <div class="wrap">
    <div class="scan-bar">
      <span class="scan-label">Quick Scan</span>
      <input class="sym-input" id="symInput" placeholder="e.g. SOL" onkeydown="if(event.key===\'Enter\') runQuickScan()">
      <button class="btn primary" onclick="runQuickScan()">Scan</button>
      <div class="scan-divider"></div>
      <button class="btn" onclick="runShortCheck()">Short Check</button>
      <button class="btn" onclick="runAccumCheck()">Accum Check</button>
      <div class="scan-divider"></div>
      <button class="btn" onclick="exportResults(\'all\')">📥 Export CSV</button>
    </div>
    <div class="result-panel" id="resultPanel">
      <div class="rp-head">
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="rp-sym" id="rpSym">—</span>
          <span class="rp-price" id="rpPrice"></span>
        </div>
        <button class="btn-close" onclick="closeResult()">✕</button>
      </div>
      <div class="rp-body" id="rpBody"></div>
    </div>
    <div class="market-row">
      <button class="mode-btn" id="btnAccumScan" onclick="runMarketScan(\'accum\')"><span class="mode-icon">◉</span>
        Smart Accumulation Scan</button>
      <button class="mode-btn" id="btnPumpScan" onclick="runMarketScan(\'pump\')"><span class="mode-icon">▲</span> Pump
        Scan (5D)</button>
      <button class="mode-btn" id="btnShortScan" onclick="runMarketScan(\'short\')"><span class="mode-icon">▼</span> Short
        Scan</button>
      <button class="mode-btn" id="btnTopScan" onclick="runMarketScan(\'top\')"><span class="mode-icon">⚡</span> Top
        Movers</button>
    </div>
    <div class="scan-log" id="scanLog">
      <div class="log-title">Scan Progress</div>
      <div class="log-lines" id="logLines"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-l">Found</div>
        <div class="stat-v" id="stTotal">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Accumulation</div>
        <div class="stat-v blue" id="stAccum">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Pump</div>
        <div class="stat-v green" id="stPump">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Short</div>
        <div class="stat-v red" id="stShort">—</div>
      </div>
      <div class="stat">
        <div class="stat-l">Scanned</div>
        <div class="stat-v" id="stScanned">—</div>
      </div>
    </div>
    <div class="section-head">
      <span class="section-title" id="sectionTitle">Run a scan to find signals</span>
    </div>
    <div class="cards" id="cardsGrid">
      <div class="empty">
        <div class="empty-icon">◎</div>
        <div class="empty-msg">No signals yet</div>
        <div class="empty-sub">Click a scan mode above to start</div>
      </div>
    </div>
  </div>
  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONFIG & CONSTANTS
    // ═══════════════════════════════════════════════════════════════
    const FAPI = 'https://fapi.binance.com/fapi/v1';
    const CG = 'https://api.coingecko.com/api/v3';
    const THRESHOLDS = {

      PRICE_FLAT_MIN: -15, PRICE_FLAT_MAX: 25, FUNDING_NEG: -0.01, FUNDING_POS: 0.05,

      else if (d.rsi4h < THRESHOLDS.RSI_OVERBOUGHT) checks.push({ warn: true, text: `RSI 4H: ${d.rsi4h} — neutral` });
      else checks.push({ fail: true, text: `RSI 4H: ${d.rsi4h} — overbought` });
      if (d.funding !== null && d.funding < THRESHOLDS.FUNDING_NEG) { score++; checks.push({ pass: true, text: `Funding: ${d.funding.toFixed(4)}% — negatif, squeeze fuel 🚀` }); }
      else if (d.funding !== null) checks.push({ warn: true, text: `Funding: ${d.funding.toFixed(4)}% — tidak negatif` });
      else checks.push({ fail: true, text: `Funding: N/A` });
      if (d.bids >= THRESHOLDS.BID_DEPTH_STRONG) { score++; checks.push({ pass: true, text: `Bid wall kuat: $${(d.bids / 1000).toFixed(0)}K` }); }
      else if (d.bids >= THRESHOLDS.BID_DEPTH_OK) checks.push({ warn: true, text: `Bid cukup: $${(d.bids / 1000).toFixed(0)}K` });
      else checks.push({ fail: true, text: `Bid tipis: $${(d.bids / 1000).toFixed(0)}K` });

      // NEW: OI checks
      if (d.oiData && d.oiData.change24h > THRESHOLDS.OI_INCREASE_STRONG) { score += 2; checks.push({ pass: true, text: `Open Interest 24H: +${d.oiData.change24h.toFixed(1)}% — uang baru masuk` }); }
      else if (d.oiData && d.oiData.change24h > THRESHOLDS.OI_INCREASE_MODERATE) { score++; checks.push({ warn: true, text: `Open Interest 24H: +${d.oiData.change24h.toFixed(1)}% — OI naik` }); }
      else if (d.oiData) { checks.push({ fail: true, text: `Open Interest 24H: ${d.oiData.change24h.toFixed(1)}% — OI tidak naik signifikan` }); }
      else { checks.push({ fail: true, text: `Open Interest: N/A` }); }

      // NEW: VSA Absorption check
      // This check is already integrated into detectSmartAccumulation, so we just need to reflect its outcome if it was a strong signal
      // For simplicity, we'll assume detectSmartAccumulation's signals array will contain this if it passed.
      // We need to pass klines4h to scoreAccum if we want to re-run VSA here, or rely on the score from detectSmartAccumulation.
      // For now, let's just add a placeholder for VSA in the scoring if it's detected.
      // A more robust solution would be to pass the full `signals` array from `detectSmartAccumulation` here.
      // For this example, I'll just add a simple check if the VSA absorption was detected in the main analysis.
      // Note: The `d` object passed to `scoreAccum` does not contain `klines4h` directly, so `detectVSAAbsorption` cannot be called here directly.
      // The `detectSmartAccumulation` function already calculates the score and signals, so `scoreAccum` might become redundant or need refactoring.
      // For now, I'll keep `scoreAccum` for the existing checks and add a placeholder for VSA.

      const pct = Math.round(score / 9 * 100); // Adjusted max score
      const cls = score >= 7 ? 'high' : score >= 4 ? 'mid' : 'low';
      const verdict = score >= 7 ? { cls: 'strong', text: '🟢 AKUMULASI SANGAT KUAT — Potensi pump besar' } : score >= 4 ? { cls: 'medium', text: '🟡 AKUMULASI MODERAT — Perlu pantauan lebih lanjut' } : { cls: 'weak', text: '🔴 AKUMULASI LEMAH — Hindari atau pantau ketat' };

      return { score, pct, cls, verdict, checks };
    }

    // ═══════════════════════════════════════════════════════════════
    // MAIN SCAN LOGIC (Updated)
    // ═══════════════════════════════════════════════════════════════
    let allSymbols = [];
    let currentScanMode = '';
    let scanInterval;

    async function fetchAllSymbols() {
      logMsg('Fetching all symbols from Binance...', 'info');
      const exchangeInfo = await binance('exchangeInfo', {}, 1);
      allSymbols = exchangeInfo.symbols
        .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
        .map(s => s.symbol.replace('USDT', ''));
      logMsg(`Found ${allSymbols.length} symbols.`, 'ok');
    }

    async function runQuickScan() {
      const symbol = document.getElementById('symInput').value.toUpperCase();
      if (!symbol) { alert('Please enter a symbol (e.g., SOL)'); return; }
      clearLog(); showLog();
      logMsg(`Starting quick scan for ${symbol}...`, 'info');
      document.getElementById('liveDot').classList.add('loading');
      document.getElementById('sectionTitle').textContent = `Quick Scan: ${symbol}`;
      document.getElementById('cardsGrid').innerHTML = '<div class="skel-card"><div class="skel" style="width:60px;height:20px;"></div><div class="skel" style="width:150px;height:20px;"></div></div>';

      try {
        const data = await analyzeCoin(symbol);
        const accumResult = detectSmartAccumulation(data, data.klines4h, data.klines1d, data.oiData);
        const pumpResult = detectPumpExhaustion(data, data.klines4h, data.klines1d);

        displayResultPanel(data, accumResult, pumpResult);
        logMsg(`Quick scan for ${symbol} completed.`, 'ok');
      } catch (error) {
        logMsg(`Error during quick scan for ${symbol}: ${error.message}`, 'bad');
        document.getElementById('liveDot').classList.add('error');
      } finally {
        document.getElementById('liveDot').classList.remove('loading');
        document.getElementById('liveDot').classList.add('active');
      }
    }

    async function runMarketScan(mode) {
      if (scanInterval) { clearInterval(scanInterval); scanInterval = null; logMsg('Previous scan stopped.', 'info'); }

      currentScanMode = mode;
      clearLog(); showLog();
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('running', 'done'));
      document.getElementById(`btn${mode.charAt(0).toUpperCase() + mode.slice(1)}Scan`).classList.add('running');
      document.getElementById('liveDot').classList.add('loading');
      document.getElementById('sectionTitle').textContent = `Running ${mode} Scan...`;
      document.getElementById('cardsGrid').innerHTML = '';
      updateStats(0, 0, 0, 0, 0);

      if (allSymbols.length === 0) {
        await fetchAllSymbols();
      }

      let scannedCount = 0;
      let foundAccum = 0;
      let foundPump = 0;
      let foundShort = 0;

      const processSymbol = async (symbol) => {
        try {
          const data = await analyzeCoin(symbol);
          scannedCount++;
          updateStats(0, 0, 0, 0, scannedCount);

          if (mode === 'accum') {
            const accumResult = detectSmartAccumulation(data, data.klines4h, data.klines1d, data.oiData);
            if (accumResult.score >= 7) { // High score for strong accumulation
              foundAccum++;
              addCard(data, 'accum', accumResult.score, accumResult.maxScore);
            }
          } else if (mode === 'pump') {
            const pumpResult = detectPumpExhaustion(data, data.klines4h, data.klines1d);
            if (pumpResult.score >= 5) { // Moderate score for pump exhaustion
              foundPump++;
              addCard(data, 'pump', pumpResult.score, pumpResult.maxScore);
            }
          } else if (mode === 'short') {
            // Existing short logic (if any) or add new logic here
            // For now, let's just use a placeholder
            if (data.funding < -0.05 && data.rsi4h > 70) { // Example: very negative funding and overbought RSI
              foundShort++;
              addCard(data, 'short', 1, 2); // Placeholder score
            }
          } else if (mode === 'top') {
            if (data.gain24h > 10) { // Top movers
              addCard(data, 'pump', data.gain24h, 100); // Use gain as score
            }
          }
          updateStats(foundAccum + foundPump + foundShort, foundAccum, foundPump, foundShort, scannedCount);
        } catch (error) {
          logMsg(`Error processing ${symbol}: ${error.message}`, 'bad');
        }
      };

      // Process symbols in batches to manage rate limits and UI updates
      const batchSize = 10;
      for (let i = 0; i < allSymbols.length; i += batchSize) {
        const batch = allSymbols.slice(i, i + batchSize);
        await Promise.all(batch.map(processSymbol));
        await sleep(1000); // Small delay between batches
      }

      document.getElementById(`btn${mode.charAt(0).toUpperCase() + mode.slice(1)}Scan`).classList.remove('running');
      document.getElementById(`btn${mode.charAt(0).toUpperCase() + mode.slice(1)}Scan`).classList.add('done');
      document.getElementById('liveDot').classList.remove('loading');
      document.getElementById('liveDot').classList.add('active');
      logMsg(`${mode} scan completed. Found ${foundAccum + foundPump + foundShort} signals.`, 'ok');
    }

    function updateStats(total, accum, pump, short, scanned) {
      document.getElementById('stTotal').textContent = total;
      document.getElementById('stAccum').textContent = accum;
      document.getElementById('stPump').textContent = pump;
      document.getElementById('stShort').textContent = short;
      document.getElementById('stScanned').textContent = scanned;
    }

    function addCard(data, type, score, maxScore) {
      const cardsGrid = document.getElementById('cardsGrid');
      if (cardsGrid.querySelector('.empty')) cardsGrid.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => runQuickScan(data.symbol);

      let pillClass = '';
      let pillText = '';
      if (type === 'accum') { pillClass = 'pill-accum'; pillText = 'ACCUM'; }
      else if (type === 'pump') { pillClass = 'pill-pump'; pillText = 'PUMP'; }
      else if (type === 'short') { pillClass = 'pill-short'; pillText = 'SHORT'; }
      else { pillClass = 'pill-reversal'; pillText = 'SIGNAL'; }

      const scorePct = Math.round((score / maxScore) * 100);
      let scoreFillClass = 'low';
      if (scorePct >= 70) scoreFillClass = 'high';
      else if (scorePct >= 40) scoreFillClass = 'mid';

      card.innerHTML = `
        <div class="card-type">
          <span class="pill ${pillClass}">${pillText}</span>
          <div class="card-mini-bar">
            <div class="card-mini-fill ${scoreFillClass}" style="width:${scorePct}%"></div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-sym">${data.symbol}</div>
          <div class="card-tags">
            <span class="tag ${data.gain24h >= 0 ? 'g' : 'r'}">${data.gain24h >= 0 ? '+' : ''}${data.gain24h.toFixed(1)}%</span>
            <span class="tag ${data.rsi4h < THRESHOLDS.RSI_OVERSOLD ? 'b' : data.rsi4h > THRESHOLDS.RSI_OVERBOUGHT ? 'r' : ''}">RSI ${data.rsi4h}</span>
            ${data.oiData && data.oiData.change24h > THRESHOLDS.OI_INCREASE_MODERATE ? `<span class="tag b">OI +${data.oiData.change24h.toFixed(1)}%</span>` : ''}
          </div>
        </div>
        <div class="card-right">
          <div class="card-time">$${data.price.toFixed(data.price > 1 ? 2 : 4)}</div>
          <a href="https://www.binance.com/en/futures/${data.symbol}" target="_blank" class="btn-sm">Trade</a>
        </div>
      `;
      cardsGrid.prepend(card);
    }

    function displayResultPanel(data, accumResult, pumpResult) {
      const rp = document.getElementById('resultPanel');
      document.getElementById('rpSym').textContent = data.symbol;
      document.getElementById('rpPrice').textContent = `$${data.price.toFixed(data.price > 1 ? 2 : 4)} (${data.gain24h >= 0 ? '+' : ''}${data.gain24h.toFixed(1)}%)`;

      let bodyHtml = `
        <div class="metrics">
          <div class="metric">
            <div class="metric-l">Vol 24H</div>
            <div class="metric-v">$${(data.vol24h / 1000000).toFixed(2)}M</div>
          </div>
          <div class="metric">
            <div class="metric-l">RSI 4H</div>
            <div class="metric-v ${data.rsi4h < THRESHOLDS.RSI_OVERSOLD ? 'blue' : data.rsi4h > THRESHOLDS.RSI_OVERBOUGHT ? 'red' : ''}">${data.rsi4h}</div>
          </div>
          <div class="metric">
            <div class="metric-l">Funding</div>
            <div class="metric-v ${data.funding < 0 ? 'red' : data.funding > 0 ? 'green' : ''}">${data.funding !== null ? data.funding.toFixed(4) + '%' : 'N/A'}</div>
          </div>
          <div class="metric">
            <div class="metric-l">OI 24H Chg</div>
            <div class="metric-v ${data.oiData.change24h > 0 ? 'green' : 'red'}">${data.oiData.change24h.toFixed(1)}%</div>
          </div>
          <div class="metric">
            <div class="metric-l">Vol Ratio 7D</div>
            <div class="metric-v ${data.volRatio >= THRESHOLDS.VOLUME_SPIKE ? 'green' : data.volRatio >= THRESHOLDS.VOLUME_MODERATE ? 'amber' : ''}">${data.volRatio.toFixed(1)}x</div>
          </div>
          <div class="metric">
            <div class="metric-l">Price Chg 7D</div>
            <div class="metric-v ${data.priceChg7d >= 0 ? 'green' : 'red'}">${data.priceChg7d >= 0 ? '+' : ''}${data.priceChg7d.toFixed(1)}%</div>
          </div>
        </div>
      `;

      // Accumulation Score
      // The `accumResult` already contains the score and signals from `detectSmartAccumulation`
      bodyHtml += `
        <div class="score-section">
          <span class="score-label">Smart Accumulation Score</span>
          <div class="score-track">
            <div class="score-fill ${accumResult.score >= 7 ? 'high' : accumResult.score >= 4 ? 'mid' : 'low'}" style="width:${Math.round((accumResult.score / accumResult.maxScore) * 100)}%"></div>
          </div>
          <span class="score-val">${accumResult.score}/${accumResult.maxScore} (${Math.round((accumResult.score / accumResult.maxScore) * 100)}%)</span>
        </div>
        <div class="verdict ${accumResult.score >= 7 ? 'strong' : accumResult.score >= 4 ? 'medium' : 'weak'}">${accumResult.score >= 7 ? '🟢 AKUMULASI SANGAT KUAT — Potensi pump besar' : accumResult.score >= 4 ? '🟡 AKUMULASI MODERAT — Perlu pantauan lebih lanjut' : '🔴 AKUMULASI LEMAH — Hindari atau pantau ketat'}</div>
        <div class="checklist">
      `;
      accumResult.signals.forEach(signal => {
        bodyHtml += `<div class="check-row ${signal.strength === 'strong' ? 'pass' : signal.strength === 'medium' ? 'warn' : 'fail'}">
          <span class="check-icon">${signal.strength === 'strong' ? '✅' : signal.strength === 'medium' ? '⚠️' : '❌'}</span>
          <span class="check-text">${signal.text}</span>
        </div>`;
      });
      bodyHtml += `</div>`;

      // Pump Exhaustion Score (simplified for now, can be expanded)
      bodyHtml += `
        <div class="score-section" style="margin-top: 20px;">
          <span class="score-label">Pump Exhaustion Score</span>
          <div class="score-track">
            <div class="score-fill ${pumpResult.score >= 5 ? 'high' : pumpResult.score >= 3 ? 'mid' : 'low'}" style="width:${Math.round((pumpResult.score / pumpResult.maxScore) * 100)}%"></div>
          </div>
          <span class="score-val">${pumpResult.score}/${pumpResult.maxScore} (${Math.round((pumpResult.score / pumpResult.maxScore) * 100)}%)</span>
        </div>
        <div class="checklist">
      `;
      pumpResult.signals.forEach(signal => {
        bodyHtml += `<div class="check-row ${signal.strength === 'strong' ? 'fail' : signal.strength === 'medium' ? 'warn' : 'pass'}">
          <span class="check-icon">${signal.strength === 'strong' ? '❌' : signal.strength === 'medium' ? '⚠️' : '✅'}</span>
          <span class="check-text">${signal.text}</span>
        </div>`;
      });
      bodyHtml += `</div>`;

      bodyHtml += `
        <a href="https://www.binance.com/en/futures/${data.symbol}" target="_blank" class="chart-link">
          Open Binance Chart
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        </a>
      `;

      document.getElementById('rpBody').innerHTML = bodyHtml;
      rp.classList.add('show');
    }

    function closeResult() {
      document.getElementById('resultPanel').classList.remove('show');
    }

    // Initial fetch of symbols
    fetchAllSymbols();
  </script>
</body>
